<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Claudodex</title>
  <desc id="desc">A Claudodex wordmark with a compact clx terminal icon and route mark.</desc>
  <style>
    .word-main {
      fill: #1e293b;
      stroke: #f8fafc;
      stroke-width: 7px;
      paint-order: stroke;
      stroke-linejoin: round;
    }
    .word-accent {
      fill: #14b8a6;
      stroke: #f8fafc;
      stroke-width: 7px;
      paint-order: stroke;
      stroke-linejoin: round;
    }
    .tagline {
      fill: #64748b;
      stroke: #f8fafc;
      stroke-width: 4px;
      paint-order: stroke;
      stroke-linejoin: round;
    }
    .tile { fill: #0f172a; stroke: #334155; }
    .tile-shadow { fill: #0f172a; opacity: 0.18; }
    .prompt { fill: #2563eb; }
    .clx { fill: #f8fafc; }
    .route-muted { stroke: #94a3b8; }
  </style>

  <defs>
    <linearGradient id="routeGradient" x1="218" y1="130" x2="348" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="terminalEdge" x1="54" y1="56" x2="172" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <g transform="translate(54 56)">
    <rect class="tile-shadow" x="10" y="16" width="132" height="132" rx="26"/>
    <rect class="tile" x="0" y="0" width="132" height="132" rx="26" stroke-width="3"/>
    <path d="M25 36h82" stroke="url(#terminalEdge)" stroke-width="6" stroke-linecap="round"/>
    <text class="prompt" x="26" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="34" font-weight="800" letter-spacing="0">&gt;</text>
    <text class="clx" x="58" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="34" font-weight="800" letter-spacing="0">clx</text>
    <circle cx="105" cy="106" r="7" fill="#14b8a6"/>
  </g>

  <g transform="translate(214 98)">
    <path class="route-muted" d="M0 32h95" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 13"/>
    <path d="M0 32h106" stroke="url(#routeGradient)" stroke-width="8" stroke-linecap="round"/>
    <path d="M86 12l22 20-22 20" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(350 69)">
    <text x="0" y="78" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="76" font-weight="850" letter-spacing="0">
      <tspan class="word-main">Claudo</tspan><tspan class="word-accent">dex</tspan>
    </text>
    <text class="tagline" x="4" y="120" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="25" font-weight="600" letter-spacing="0">
      Claude Code on Codex models
    </text>
    <path d="M5 139h258" stroke="#14b8a6" stroke-width="5" stroke-linecap="round"/>
    <path d="M280 139h70" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
